spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

dbbackup:
  profiles:
    test-pg:
      db-type: POSTGRES
      host: localhost
      port: 5432
      database: testdb
      username: testuser
      password: testpass
  storage:
    local:
      path: ${java.io.tmpdir}/dbbackup-test
  notifications:
    slack:
      webhook-url: ""
